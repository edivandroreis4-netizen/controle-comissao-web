<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#17316d">
  <title>Sem conexão | Controle de Comissão</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#f4f7fb;color:#172033;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.card{max-width:560px;padding:32px;border:1px solid #d9e0ea;border-radius:24px;background:#fff;box-shadow:0 18px 50px rgba(31,54,103,.12);text-align:center}.icone{width:72px;height:72px;margin:0 auto 20px;display:grid;place-items:center;border-radius:20px;background:#17316d;color:#fff;font-size:2rem;font-weight:900}h1{margin-bottom:12px}p{color:#4f5d75;line-height:1.6}button{margin-top:20px;padding:12px 18px;border:0;border-radius:12px;background:#2457d6;color:#fff;font:inherit;font-weight:800;cursor:pointer}
  </style>
</head>
<body>
  <main class="card">
    <div class="icone" aria-hidden="true">%</div>
    <h1>Você está sem conexão</h1>
    <p>Os arquivos principais do aplicativo ficam disponíveis offline. Reconecte-se e tente novamente caso esta tela apareça.</p>
    <button type="button" onclick="location.reload()">Tentar novamente</button>
  </main>
</body>
</html>
